<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='6' fill='%23d8b46a'/><circle cx='10.5' cy='8' r='6' fill='%2307070a'/></svg>" />
    <title>Umbral — Shadow Puzzle</title>
    <style>
      :root {
        --ink: #e9e6df;
        --ink-dim: #9a958c;
        --accent: #d8b46a;
        --glow: #7fd6a8;
        --panel: rgba(14, 14, 18, 0.55);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #07070a;
        color: var(--ink);
        font-family: "Avenir Next", "Segoe UI", system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }

      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }

      /* ---- HUD overlay ---- */
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
      }

      .hud-top {
        position: absolute;
        top: 0; left: 0; right: 0;
        padding: 26px 30px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
      }

      .level-tag {
        font-size: 11px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--ink-dim);
        margin-bottom: 8px;
      }

      .hint {
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 0.01em;
        color: var(--ink);
        max-width: 38ch;
        text-shadow: 0 2px 18px rgba(0,0,0,0.7);
      }

      .brand {
        text-align: right;
        font-size: 13px;
        letter-spacing: 0.5em;
        text-transform: uppercase;
        color: var(--accent);
        opacity: 0.85;
      }
      .brand small {
        display: block;
        font-size: 9px;
        letter-spacing: 0.3em;
        color: var(--ink-dim);
        margin-top: 6px;
      }

      /* ---- proximity meter ---- */
      .meter-wrap {
        position: absolute;
        left: 50%;
        bottom: 42px;
        transform: translateX(-50%);
        width: min(420px, 70vw);
        text-align: center;
      }
      .meter-label {
        font-size: 10px;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        color: var(--ink-dim);
        margin-bottom: 10px;
      }
      .meter {
        position: relative;
        height: 6px;
        border-radius: 6px;
        background: rgba(255,255,255,0.08);
        overflow: hidden;
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
      }
      .meter-fill {
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 0%;
        border-radius: 6px;
        background: #ffffff;
        box-shadow: 0 0 14px rgba(255, 255, 255, 0.5);
        transition: background 0.4s ease;
      }

      /* ---- hint to drag ---- */
      .drag-hint {
        position: absolute;
        left: 50%;
        bottom: 96px;
        transform: translateX(-50%);
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink-dim);
        opacity: 0;
        transition: opacity 0.6s ease;
      }
      .drag-hint.show { opacity: 0.7; }

      /* ---- win overlay ---- */
      #win {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: radial-gradient(ellipse at center, rgba(6,8,10,0.4), rgba(4,5,7,0.86));
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.7s ease;
      }
      #win.show { opacity: 1; pointer-events: auto; }

      #win .recognized {
        font-size: 11px;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: var(--glow);
      }
      #win .shape-name {
        font-size: 64px;
        font-weight: 300;
        letter-spacing: 0.04em;
        margin: 0;
        text-shadow: 0 4px 40px rgba(0,0,0,0.6);
      }
      #win button {
        margin-top: 8px;
        padding: 14px 38px;
        font-size: 13px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: #0a0a0c;
        background: linear-gradient(90deg, var(--accent), #e7cf94);
        border: none;
        border-radius: 40px;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 6px 30px rgba(216, 180, 106, 0.3);
      }
      #win button:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(216, 180, 106, 0.45); }

      #win .win-actions { display: flex; gap: 14px; margin-top: 8px; }
      #win button.ghost {
        background: transparent;
        color: var(--ink-dim);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: none;
      }
      #win button.ghost:hover {
        color: var(--ink);
        border-color: rgba(216, 180, 106, 0.5);
        box-shadow: none;
      }

      /* ---- levels button (HUD) ---- */
      .levels-btn {
        pointer-events: auto;
        margin-top: 16px;
        padding: 8px 18px;
        font-size: 11px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--ink-dim);
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 30px;
        cursor: pointer;
        transition: color 0.2s ease, border-color 0.2s ease;
      }
      .levels-btn:hover { color: var(--ink); border-color: rgba(216, 180, 106, 0.5); }

      /* ---- level select ---- */
      #level-select {
        position: fixed;
        inset: 0;
        z-index: 25;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: radial-gradient(ellipse at center, rgba(6, 8, 10, 0.72), rgba(4, 5, 7, 0.95));
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s ease;
      }
      #level-select.show { opacity: 1; pointer-events: auto; }
      .ls-inner { width: min(900px, 92vw); text-align: center; }
      .ls-eyebrow {
        font-size: 12px;
        letter-spacing: 0.5em;
        text-transform: uppercase;
        color: var(--accent);
        opacity: 0.85;
      }
      .ls-title {
        font-size: 40px;
        font-weight: 300;
        letter-spacing: 0.04em;
        margin: 12px 0 34px;
      }
      .ls-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(168px, 1fr));
        gap: 18px;
      }
      .ls-card {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        padding: 22px 22px;
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        cursor: pointer;
        color: var(--ink);
        font-family: inherit;
        text-align: left;
        transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      }
      .ls-card:hover {
        transform: translateY(-3px);
        border-color: rgba(216, 180, 106, 0.5);
        background: rgba(20, 20, 26, 0.7);
      }
      .ls-card .num {
        font-size: 11px;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        color: var(--ink-dim);
      }
      .ls-card .nm { font-size: 24px; font-weight: 400; letter-spacing: 0.02em; }

      .ls-card.done { border-color: rgba(127, 214, 168, 0.35); }
      .ls-card.done .nm { color: var(--glow); }
      .ls-card.locked {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .ls-card.locked:hover {
        transform: none;
        border-color: rgba(255, 255, 255, 0.08);
        background: var(--panel);
      }
      .ls-card.locked .nm { color: var(--ink-dim); }

      /* open-settings button on the level-select page */
      .ls-settings-btn {
        margin-top: 30px;
        padding: 9px 22px;
        font-size: 11px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--ink-dim);
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 30px;
        cursor: pointer;
        font-family: inherit;
        transition: color 0.2s ease, border-color 0.2s ease;
      }
      .ls-settings-btn:hover { color: var(--ink); border-color: rgba(216, 180, 106, 0.5); }

      /* ---- settings ---- */
      #settings {
        position: fixed;
        inset: 0;
        z-index: 29;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: radial-gradient(ellipse at center, rgba(6, 8, 10, 0.8), rgba(4, 5, 7, 0.97));
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease;
      }
      #settings.show { opacity: 1; pointer-events: auto; }
      .settings-card {
        width: min(440px, 92vw);
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 32px 30px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        text-align: center;
      }
      .settings-title {
        font-size: 30px;
        font-weight: 300;
        letter-spacing: 0.04em;
        margin: 6px 0 0;
      }
      .settings-progress {
        font-size: 13px;
        color: var(--ink-dim);
        letter-spacing: 0.04em;
        margin: 0 0 6px;
      }
      .settings-btn {
        padding: 12px 20px;
        font-size: 12px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        border-radius: 30px;
        cursor: pointer;
        font-family: inherit;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.04);
        color: var(--ink);
        transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      }
      .settings-btn:hover { border-color: rgba(216, 180, 106, 0.5); }
      .settings-btn.ghost { color: var(--ink-dim); }
      .settings-btn.danger { color: #f0b6b6; border-color: rgba(220, 120, 120, 0.4); }
      .settings-btn.danger:hover { background: rgba(220, 120, 120, 0.12); border-color: rgba(220, 120, 120, 0.7); }
      .settings-confirm {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 16px;
        border: 1px dashed rgba(220, 120, 120, 0.45);
        border-radius: 12px;
      }
      .settings-confirm[hidden] { display: none; }
      .settings-confirm p { margin: 0; font-size: 13px; color: var(--ink); }
      .settings-confirm-actions { display: flex; gap: 10px; justify-content: center; }

      /* ---- main menu ---- */
      #main-menu {
        position: fixed;
        inset: 0;
        z-index: 28;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: radial-gradient(ellipse at center, rgba(6, 8, 10, 0.55), rgba(4, 5, 7, 0.92));
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.6s ease;
      }
      #main-menu.show { opacity: 1; pointer-events: auto; }
      .mm-title {
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-size: 92px;
        font-weight: 700;
        font-style: oblique 8deg;
        letter-spacing: -0.01em;
        margin: 0;
        color: var(--ink);
        text-shadow: 0 4px 40px rgba(0, 0, 0, 0.6);
      }
      .mm-tagline {
        font-size: 12px;
        letter-spacing: 0.5em;
        text-transform: uppercase;
        color: var(--accent);
        opacity: 0.85;
        margin: 14px 0 34px;
      }
      .mm-play {
        padding: 16px 64px;
        font-size: 15px;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #0a0a0c;
        background: linear-gradient(90deg, var(--accent), #e7cf94);
        border: none;
        border-radius: 40px;
        cursor: pointer;
        font-family: inherit;
        box-shadow: 0 6px 30px rgba(216, 180, 106, 0.3);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .mm-play:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(216, 180, 106, 0.45); }

      /* ---- loading ---- */
      #loading {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #07070a;
        color: var(--ink-dim);
        font-size: 12px;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        transition: opacity 0.8s ease;
      }
      #loading.hide { opacity: 0; pointer-events: none; }

      @media (max-width: 600px) {
        .hint { font-size: 15px; }
        #win .shape-name { font-size: 44px; }
        .hud-top { padding: 18px 18px; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div class="hud-top">
        <div>
          <div class="level-tag" id="level-tag">Shadow I</div>
          <div class="hint" id="hint">Rotate the form…</div>
          <button class="levels-btn" id="levels-btn">☰ Levels</button>
        </div>
        <div class="brand">
          Umbral
          <small>cast a shadow worth knowing</small>
        </div>
      </div>

      <div class="drag-hint" id="drag-hint">drag to rotate</div>

      <div class="meter-wrap">
        <div class="meter-label">Recognition</div>
        <div class="meter"><div class="meter-fill" id="meter-fill"></div></div>
      </div>
    </div>

    <div id="win">
      <div class="recognized">Recognized</div>
      <h1 class="shape-name" id="win-name">Rabbit</h1>
      <div class="win-actions">
        <button id="next-btn">Next Shadow</button>
        <button id="select-btn" class="ghost">Level Select</button>
      </div>
    </div>

    <div id="main-menu">
      <h1 class="mm-title">Umbral</h1>
      <div class="mm-tagline">cast a shadow worth knowing</div>
      <button class="mm-play" id="play-btn">Play</button>
      <button class="ls-settings-btn" id="settings-open">⚙ Settings</button>
    </div>

    <div id="level-select">
      <div class="ls-inner">
        <div class="ls-eyebrow">Umbral</div>
        <h2 class="ls-title">Choose a Shadow</h2>
        <div class="ls-grid" id="level-grid"></div>
      </div>
    </div>

    <div id="settings">
      <div class="settings-card">
        <div class="ls-eyebrow">Umbral</div>
        <h2 class="settings-title">Settings</h2>
        <p class="settings-progress" id="settings-progress">No shadows cleared yet.</p>
        <button id="reset-btn" class="settings-btn danger">Reset Progress</button>
        <div class="settings-confirm" id="reset-confirm" hidden>
          <p>This relocks every shadow but the first. Are you sure?</p>
          <div class="settings-confirm-actions">
            <button id="reset-yes" class="settings-btn danger">Yes, reset</button>
            <button id="reset-no" class="settings-btn ghost">Cancel</button>
          </div>
        </div>
        <button id="settings-close" class="settings-btn ghost">Close</button>
      </div>
    </div>

    <div id="loading">Summoning the dark…</div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
