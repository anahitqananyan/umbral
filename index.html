<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='6' fill='%23d8b46a'/><circle cx='10.5' cy='8' r='6' fill='%2307070a'/></svg>" />
    <title>Umbral — Shadow Puzzle</title>
    <style>
      :root {
        --ink: #e9e6df;
        --ink-dim: #9a958c;
        --accent: #d8b46a;
        --glow: #7fd6a8;
        --panel: rgba(14, 14, 18, 0.55);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #07070a;
        color: var(--ink);
        font-family: "Avenir Next", "Segoe UI", system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }

      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }

      /* ---- HUD overlay ---- */
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
      }

      .hud-top {
        position: absolute;
        top: 0; left: 0; right: 0;
        padding: 26px 30px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
      }

      .level-tag {
        font-size: 11px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--ink-dim);
        margin-bottom: 8px;
      }

      .hint {
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 0.01em;
        color: var(--ink);
        max-width: 38ch;
        text-shadow: 0 2px 18px rgba(0,0,0,0.7);
      }

      .brand {
        text-align: right;
        font-size: 13px;
        letter-spacing: 0.5em;
        text-transform: uppercase;
        color: var(--accent);
        opacity: 0.85;
      }
      .brand small {
        display: block;
        font-size: 9px;
        letter-spacing: 0.3em;
        color: var(--ink-dim);
        margin-top: 6px;
      }

      /* ---- proximity meter ---- */
      .meter-wrap {
        position: absolute;
        left: 50%;
        bottom: 42px;
        transform: translateX(-50%);
        width: min(420px, 70vw);
        text-align: center;
      }
      .meter-label {
        font-size: 10px;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        color: var(--ink-dim);
        margin-bottom: 10px;
      }
      .meter {
        position: relative;
        height: 6px;
        border-radius: 6px;
        background: rgba(255,255,255,0.08);
        overflow: hidden;
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
      }
      .meter-fill {
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 0%;
        border-radius: 6px;
        background: linear-gradient(90deg, var(--accent), var(--glow));
        box-shadow: 0 0 14px rgba(127, 214, 168, 0.5);
        transition: background 0.4s ease;
      }

      /* ---- hint to drag ---- */
      .drag-hint {
        position: absolute;
        left: 50%;
        bottom: 96px;
        transform: translateX(-50%);
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink-dim);
        opacity: 0;
        transition: opacity 0.6s ease;
      }
      .drag-hint.show { opacity: 0.7; }

      /* ---- win overlay ---- */
      #win {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: radial-gradient(ellipse at center, rgba(6,8,10,0.4), rgba(4,5,7,0.86));
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.7s ease;
      }
      #win.show { opacity: 1; pointer-events: auto; }

      #win .recognized {
        font-size: 11px;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: var(--glow);
      }
      #win .shape-name {
        font-size: 64px;
        font-weight: 300;
        letter-spacing: 0.04em;
        margin: 0;
        text-shadow: 0 4px 40px rgba(0,0,0,0.6);
      }
      #win button {
        pointer-events: auto;
        margin-top: 8px;
        padding: 14px 38px;
        font-size: 13px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: #0a0a0c;
        background: linear-gradient(90deg, var(--accent), #e7cf94);
        border: none;
        border-radius: 40px;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 6px 30px rgba(216, 180, 106, 0.3);
      }
      #win button:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(216, 180, 106, 0.45); }

      /* ---- loading ---- */
      #loading {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #07070a;
        color: var(--ink-dim);
        font-size: 12px;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        transition: opacity 0.8s ease;
      }
      #loading.hide { opacity: 0; pointer-events: none; }

      @media (max-width: 600px) {
        .hint { font-size: 15px; }
        #win .shape-name { font-size: 44px; }
        .hud-top { padding: 18px 18px; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div class="hud-top">
        <div>
          <div class="level-tag" id="level-tag">Shadow I</div>
          <div class="hint" id="hint">Rotate the form…</div>
        </div>
        <div class="brand">
          Umbral
          <small>cast a shadow worth knowing</small>
        </div>
      </div>

      <div class="drag-hint" id="drag-hint">drag to rotate</div>

      <div class="meter-wrap">
        <div class="meter-label">Recognition</div>
        <div class="meter"><div class="meter-fill" id="meter-fill"></div></div>
      </div>
    </div>

    <div id="win">
      <div class="recognized">Recognized</div>
      <h1 class="shape-name" id="win-name">Rabbit</h1>
      <button id="next-btn">Next Shadow</button>
    </div>

    <div id="loading">Summoning the dark…</div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
